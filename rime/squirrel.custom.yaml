patch:
  style:
    color_scheme: azure
    candidate_list_layout: stacked          # stacked | linear       皮肤横竖排显示是调整这个
    text_orientation: horizontal            # horizontal | vertical  文字方向
    inline_preedit: true                    # 单行显示，false双行显示
    candidate_format: "%c\u2005%@"          # 用 1/6 em 空格 U+2005 来控制编号 %c 和候选词 %@ 前后的空间
    corner_radius: 3                        # 候选条圆角
    hilited_corner_radius: 3                # 高亮圆角
    border_height: 4                        # 窗口边界高度，大于圆角半径才生效
    border_width: 4                         # 窗口边界宽度，大于圆角半径才生效
    border_color_width: 0
    font_face: "PingFangSC"                 # 候选词字体
    font_point: 16                          # 候选字词大小
    label_font_point: 14
    translucency: true
