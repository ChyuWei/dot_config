# Enable mouse support
set -g mouse on

# Copy mode with vi keys
setw -g mode-keys vi

# Enter copy mode with prefix + [
# Select with v, yank with y
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Also support rectangular selection with C-v
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Copy to system clipboard on macOS
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Mouse wheel scrolls into copy mode
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# Reduce escape delay (important for vim)
set -sg escape-time 10

# Increase scrollback buffer
set -g history-limit 50000

# Reload config with prefix + r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# Status bar - minimal, colorblind-friendly (blue/orange contrast)
set -g status-position bottom
set -g status-style "bg=default,fg=#888888"
set -g status-left ""
set -g status-right "#[fg=#888888]%H:%M"
set -g status-right-length 10
set -g status-justify left

# Window status - inactive grey, active bright orange (high contrast)
set -g window-status-format "#[fg=#888888] #I:#W "
set -g window-status-current-format "#[bg=#FF9F1C,fg=#1a1a1a,bold] #I:#W "
set -g window-status-separator ""

# Pane border - inactive dim, active blue (distinguishable for CVD)
set -g pane-border-style "fg=#444444"
set -g pane-active-border-style "fg=#4D9DE0"

# Message style
set -g message-style "bg=#4D9DE0,fg=#1a1a1a"

# Allow terminal to pass through hyperlinks and OSC sequences
set -g allow-passthrough on

# Reduce flicker
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none
